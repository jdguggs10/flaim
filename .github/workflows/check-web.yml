name: Check Web

on:
  push:
    branches:
      - main
    paths:
      - 'web/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/check-web.yml'
  pull_request:
    paths:
      - 'web/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/check-web.yml'
  workflow_dispatch:

jobs:
  check:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        working-directory: web

      - name: Type-check
        run: npx tsc --noEmit
        working-directory: web
