name: Deploy Workers

on:
  push:
    branches:
      - main
    paths:
      - 'workers/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy-workers.yml'
  pull_request:
    paths:
      - 'workers/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy-workers.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # Platform workers deploy first. The gateway job below depends on this one:
  # fantasy-mcp injects normalized get_roster snapshot params, and a new
  # gateway must never race ahead of providers that don't understand them.
  providers:
    name: ${{ matrix.worker }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        worker: [auth-worker, espn-client, yahoo-client, sleeper-client]
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Test ${{ matrix.worker }}
        run: pnpm test
        working-directory: workers/${{ matrix.worker }}

      - name: Type-check ${{ matrix.worker }}
        run: pnpm run type-check
        working-directory: workers/${{ matrix.worker }}

      - name: Validate auth-worker Wrangler bindings
        if: matrix.worker == 'auth-worker'
        working-directory: workers/auth-worker
        run: |
          output="$(npx wrangler deploy --dry-run --env dev 2>&1)"
          printf '%s\n' "$output"
          if printf '%s\n' "$output" | grep -q 'Unexpected fields'; then
            echo "Wrangler config contains unexpected fields"
            exit 1
          fi
          printf '%s\n' "$output" | grep -q 'env.TOKEN_RATE_LIMITER'
          printf '%s\n' "$output" | grep -q 'env.CREDENTIALS_RATE_LIMITER'

      - name: Deploy ${{ matrix.worker }}
        if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
        run: npx wrangler deploy --env ${{ github.ref == 'refs/heads/main' && 'prod' || 'preview' }}
        working-directory: workers/${{ matrix.worker }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  gateway:
    name: fantasy-mcp
    runs-on: ubuntu-latest
    needs: providers
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Test fantasy-mcp
        run: pnpm test
        working-directory: workers/fantasy-mcp

      - name: Type-check fantasy-mcp
        run: pnpm run type-check
        working-directory: workers/fantasy-mcp

      - name: Validate fantasy-mcp Wrangler bindings
        working-directory: workers/fantasy-mcp
        run: |
          output="$(npx wrangler deploy --dry-run --env dev 2>&1)"
          printf '%s\n' "$output"
          if printf '%s\n' "$output" | grep -q 'Unexpected fields'; then
            echo "Wrangler config contains unexpected fields"
            exit 1
          fi
          printf '%s\n' "$output" | grep -q 'env.MCP_RATE_LIMITER'

      - name: Deploy fantasy-mcp
        if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
        run: npx wrangler deploy --env ${{ github.ref == 'refs/heads/main' && 'prod' || 'preview' }}
        working-directory: workers/fantasy-mcp
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
