name: Deploy Workers

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        worker: [auth-worker, espn-client, yahoo-client, sleeper-client, fantasy-mcp]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Test ${{ matrix.worker }}
        run: npm test
        working-directory: workers/${{ matrix.worker }}

      - name: Type-check ${{ matrix.worker }}
        run: npm run type-check
        working-directory: workers/${{ matrix.worker }}

      - name: Validate auth-worker Wrangler bindings
        if: matrix.worker == 'auth-worker'
        working-directory: workers/auth-worker
        run: |
          output="$(npx wrangler deploy --dry-run --env dev 2>&1)"
          printf '%s\n' "$output"
          if printf '%s\n' "$output" | grep -q 'Unexpected fields'; then
            echo "Wrangler config contains unexpected fields"
            exit 1
          fi
          printf '%s\n' "$output" | grep -q 'env.TOKEN_RATE_LIMITER'
          printf '%s\n' "$output" | grep -q 'env.CREDENTIALS_RATE_LIMITER'

  deploy:
    name: Deploy ${{ matrix.worker }}
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    strategy:
      matrix:
        worker: [auth-worker, espn-client, yahoo-client, sleeper-client, fantasy-mcp]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Deploy ${{ matrix.worker }}
        run: npx wrangler deploy --env ${{ github.ref == 'refs/heads/main' && 'prod' || 'preview' }}
        working-directory: workers/${{ matrix.worker }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
